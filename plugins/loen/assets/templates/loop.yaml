topic: "{{topic}}"
status: active
stage: goal
created: "{{created_date}}"
updated: "{{updated_date}}"
artifact_root: "docs/loen/{{topic}}"
checks: []
decision: pending
agents:
  planner:
    tools: [read, search]
    sandbox: read-only
  worker:
    tools: [read, search, edit, shell]
    sandbox: workspace-write
  verifier:
    tools: [read, search, shell]
    sandbox: read-only
    must_not_edit: true
  reviewer:
    tools: [read, search, shell]
    sandbox: read-only
    must_not_edit: true
stages:
  goal:
    roles: [planner, worker]
  context:
    roles: [planner, worker, researcher]
  plan:
    roles: [planner]
  act:
    roles: [worker]
  check:
    roles: [verifier]
  reflect:
    roles: [planner, verifier, reviewer]
  result:
    roles: [planner, verifier, reviewer]
tools:
  allowed:
    - read
    - search
    - apply_patch
    - shell
  denied:
    - network
    - secrets
    - destructive_git
    - external_write
permissions:
  filesystem:
    mutable_scope:
      - src/**
      - tests/**
    protected_scope:
      - migrations/**
      - secrets/**
  network:
    mode: off
    allowlist: []
  shell:
    allow:
      - pytest tests/auth
      - ruff check .
    deny_patterns:
      - rm -rf
      - git reset --hard
      - curl *|sh
