# Codex configuration for the isolated icodex environment (CODEX_HOME =
# .codex-isolated). The launcher rewrites the marketplace `source` line to this
# host's absolute path before launching Codex (see lib/plugin/superpowers.sh).
#
# Do NOT put secrets here. The API key goes in .codex_config as ICODEX_API_KEY
# (git-ignored, chmod 600) or via `codex login` (auth.json, git-ignored).

# Example — point the default provider at a custom OpenAI-compatible endpoint:
#
# model = "gpt-5-codex"
# model_provider = "litellm"
#
# [model_providers.litellm]
# name = "litellm"
# base_url = "https://homelab.ikeniborn.ru/llm/v1"
# env_key = "OPENAI_API_KEY"

# --- Superpowers plugin (vendored under .codex-isolated/plugins/cache) ---
# bypass_hook_trust is a TOP-LEVEL key: it must appear before any [section] so it
# stays in the root table (a key after [features] would become features.bypass_…).
# It lets the plugin's SessionStart hook fire non-interactively.
bypass_hook_trust = true
model = "gpt-5.5"
model_reasoning_effort = "high"
sandbox_mode = "danger-full-access"
approval_policy = "on-request"
default_permissions = "ssh-on-request"
web_search = "cached"

# Run modes (set ICODEX_MODE in .codex_config; default is full-ask):
# - ro:        read-only sandbox, on-request approval, dev-safe profile.
# - safe:      workspace-write, on-request approval, dev-safe profile.
# - full-ask:  danger-full-access, on-request approval, ssh-on-request profile.
# - full-auto: danger-full-access, never approval, managed permissions removed
#              (no prompts at all; .git writable). = --dangerously-bypass-approvals-and-sandbox.
# icodex rewrites sandbox_mode / approval_policy / default_permissions and grants
# ".git/" = "write" in the active profile on every run. Granular ICODEX_SANDBOX /
# ICODEX_APPROVAL / ICODEX_PERMISSIONS override individual fields.
#
# Permission profiles (managed filesystem/network rules, selected by default_permissions):
# - dev-safe:       locked down. No network, no SSH material.
# - ssh-on-request: outbound network + read-only ~/.ssh for SSH-based work.

# `vendor/superpowers/pin` selects the exact committed cache. Refresh only with
# scripts/vendor-superpowers.sh: it stages ordered zero-fuzz patches and keeps the
# previous cache and pin when source discovery, patching, or validation fails.
[marketplaces.openai-curated]
source_type = "local"
source = "/home/ikeniborn/Documents/Project/icodex/.codex-isolated/tmp/marketplaces/openai-curated"

[plugins."superpowers@openai-curated"]
enabled = true

[features]
multi_agent = true

[permissions.dev-safe.filesystem]
glob_scan_max_depth = 4
":minimal" = "read"
":tmpdir" = "write"
":slash_tmp" = "write"
"~/.ssh" = "deny"
"~/.aws" = "deny"
"~/.gnupg" = "deny"
"~/.kube/config" = "deny"

"/home/ikeniborn/Documents/Project/icodex/.codex-isolated/bin/codex" = "read"
[permissions.dev-safe.filesystem.":workspace_roots"]
"." = "write"
".git/" = "write"
"**/.env" = "deny"
"**/.env.local" = "deny"
"**/secrets/**" = "deny"
"**/.aws/**" = "deny"
"**/.ssh/**" = "deny"
"**/.gnupg/**" = "deny"
"**/.kube/config" = "deny"
"**/*.pem" = "deny"
"**/*.key" = "deny"
"**/*.pfx" = "deny"
"**/*.p12" = "deny"
"**/.credentials" = "deny"
"**/.credentials.json" = "deny"
"**/credentials.json" = "deny"
"**/credentials.yaml" = "deny"
"**/credentials.yml" = "deny"
"**/.token" = "deny"
"**/.token.*" = "deny"
"**/token.json" = "deny"
"**/token.txt" = "deny"
"**/access_token.*" = "deny"
"**/refresh_token.*" = "deny"

[permissions.dev-safe.network]
enabled = false

[permissions.ssh-on-request.filesystem]
glob_scan_max_depth = 4
":minimal" = "read"
":tmpdir" = "write"
":slash_tmp" = "write"
"~/.ssh" = "read"
"~/.aws" = "deny"
"~/.gnupg" = "deny"
"~/.kube/config" = "deny"

"/home/ikeniborn/Documents/Project/icodex/.codex-isolated/bin/codex" = "read"
[permissions.ssh-on-request.filesystem.":workspace_roots"]
"." = "write"
".git/" = "write"
"**/.env" = "deny"
"**/.env.local" = "deny"
"**/secrets/**" = "deny"
"**/.aws/**" = "deny"
"**/.ssh/**" = "deny"
"**/.gnupg/**" = "deny"
"**/.kube/config" = "deny"
"**/*.pem" = "deny"
"**/*.key" = "deny"
"**/*.pfx" = "deny"
"**/*.p12" = "deny"
"**/.credentials" = "deny"
"**/.credentials.json" = "deny"
"**/credentials.json" = "deny"
"**/credentials.yaml" = "deny"
"**/credentials.yml" = "deny"
"**/.token" = "deny"
"**/.token.*" = "deny"
"**/token.json" = "deny"
"**/token.txt" = "deny"
"**/access_token.*" = "deny"
"**/refresh_token.*" = "deny"

[permissions.ssh-on-request.network]
enabled = true

[projects."/home/ikeniborn/Documents/Project/icodex"]
