# Codex configuration for the isolated icodex environment (CODEX_HOME =
# .codex-isolated). The launcher rewrites the marketplace `source` line to this
# host's absolute path before launching Codex (see lib/plugin/superpowers.sh).
#
# Do NOT put secrets here. The API key goes in .codex_config as ICODEX_API_KEY
# (git-ignored, chmod 600) or via `codex login` (auth.json, git-ignored).

# Example — point the default provider at a custom OpenAI-compatible endpoint:
#
# model = "gpt-5-codex"
# model_provider = "litellm"
#
# [model_providers.litellm]
# name = "litellm"
# base_url = "https://litellm.ikeniborn.ru/v1"
# env_key = "OPENAI_API_KEY"

# --- Superpowers plugin (vendored under .codex-isolated/plugins/cache) ---
# bypass_hook_trust is a TOP-LEVEL key: it must appear before any [section] so it
# stays in the root table (a key after [features] would become features.bypass_…).
# It lets the plugin's SessionStart hook fire non-interactively.
bypass_hook_trust = true
model = "gpt-5.5"
model_reasoning_effort = "high"
sandbox_mode = "danger-full-access"
approval_policy = "never"
default_permissions = "ssh-on-request"
web_search = "cached"

# Launch safety modes:
# - Safer default:
#     sandbox_mode = "workspace-write"
#     approval_policy = "on-request"
# - Full filesystem access, but still asks for risky actions:
#     sandbox_mode = "danger-full-access"
#     approval_policy = "on-request"
# - Equivalent to `--dangerously-bypass-approvals-and-sandbox`:
#     sandbox_mode = "danger-full-access"
#     approval_policy = "never"
#
# Permission profiles:
# `default_permissions` selects one of the named [permissions.<name>] profiles
# below for managed filesystem/network rules. It is separate from sandbox_mode
# and approval_policy.
# - dev-safe: default locked-down profile. No network and no SSH material.
# - ssh-on-request: allows outbound network plus read-only ~/.ssh for SSH-based
#   work when managed permissions are active. Keep default.rules `ssh = prompt`
#   if SSH commands should still require explicit confirmation.

# The <ver> segment below is illustrative: the launcher rewrites the whole
# `source` line from the real cache path on each run (see spec §4.1/§4.2) — the whole line is rewritten, the placeholder is never string-substituted.
[marketplaces.openai-curated]
source_type = "local"
source = "/home/ikeniborn/Documents/Project/icodex/.codex-isolated/tmp/marketplaces/openai-curated"

[plugins."superpowers@openai-curated"]
enabled = true

# --- iwiki plugin (vendored under .codex-isolated/plugins/cache) ---
[marketplaces.ai-wiki]
source_type = "local"
source = "__ICODEX_ROOT__/.codex-isolated/plugins/cache/ai-wiki/iwiki/<ver>"

[plugins."iwiki@ai-wiki"]
enabled = true

[features]
multi_agent = true

[permissions.dev-safe.filesystem]
glob_scan_max_depth = 4
":minimal" = "read"
":tmpdir" = "write"
":slash_tmp" = "write"
"~/.ssh" = "deny"
"~/.aws" = "deny"
"~/.gnupg" = "deny"
"~/.kube/config" = "deny"

"/home/ikeniborn/Documents/Project/icodex/.codex-isolated/bin/codex" = "read"
[permissions.dev-safe.filesystem.":workspace_roots"]
"." = "write"
"**/.env" = "deny"
"**/.env.local" = "deny"
"**/secrets/**" = "deny"
"**/.aws/**" = "deny"
"**/.ssh/**" = "deny"
"**/.gnupg/**" = "deny"
"**/.kube/config" = "deny"
"**/*.pem" = "deny"
"**/*.key" = "deny"
"**/*.pfx" = "deny"
"**/*.p12" = "deny"
"**/.credentials" = "deny"
"**/.credentials.json" = "deny"
"**/credentials.json" = "deny"
"**/credentials.yaml" = "deny"
"**/credentials.yml" = "deny"
"**/.token" = "deny"
"**/.token.*" = "deny"
"**/token.json" = "deny"
"**/token.txt" = "deny"
"**/access_token.*" = "deny"
"**/refresh_token.*" = "deny"

[permissions.dev-safe.network]
enabled = false

[permissions.ssh-on-request.filesystem]
glob_scan_max_depth = 4
":minimal" = "read"
":tmpdir" = "write"
":slash_tmp" = "write"
"~/.ssh" = "read"
"~/.aws" = "deny"
"~/.gnupg" = "deny"
"~/.kube/config" = "deny"

"/home/ikeniborn/Documents/Project/icodex/.codex-isolated/bin/codex" = "read"
[permissions.ssh-on-request.filesystem.":workspace_roots"]
"." = "write"
"**/.env" = "deny"
"**/.env.local" = "deny"
"**/secrets/**" = "deny"
"**/.aws/**" = "deny"
"**/.ssh/**" = "deny"
"**/.gnupg/**" = "deny"
"**/.kube/config" = "deny"
"**/*.pem" = "deny"
"**/*.key" = "deny"
"**/*.pfx" = "deny"
"**/*.p12" = "deny"
"**/.credentials" = "deny"
"**/.credentials.json" = "deny"
"**/credentials.json" = "deny"
"**/credentials.yaml" = "deny"
"**/credentials.yml" = "deny"
"**/.token" = "deny"
"**/.token.*" = "deny"
"**/token.json" = "deny"
"**/token.txt" = "deny"
"**/access_token.*" = "deny"
"**/refresh_token.*" = "deny"

[permissions.ssh-on-request.network]
enabled = true

[projects."/home/ikeniborn/Documents/Project/icodex"]
trust_level = "trusted"

[projects."/home/ikeniborn/Documents/Project/personal-ai-wiki"]
trust_level = "trusted"

[projects."/home/ikeniborn/Documents/Project/framework"]
trust_level = "trusted"

[tui]
status_line = ["current-dir", "model-with-reasoning", "git-branch", "context-used", "five-hour-limit", "weekly-limit"]
status_line_use_colors = true

[tui.model_availability_nux]
"gpt-5.5" = 4
